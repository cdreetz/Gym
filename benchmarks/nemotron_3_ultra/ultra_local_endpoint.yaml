config_paths:
- responses_api_models/local_vllm_model/configs/nvidia/nemotron_3_ultra_dev_nemorl_gb200.yaml

# We bump up the connector per host limit since this is a larger benchmark suite
global_aiohttp_connector_limit_per_host: 16384

policy_model:
  _inherit_from: nemotron_3_ultra_dev

# Some benchmarks may require reasoning off mode
policy_model_reasoning_off:
  responses_api_models:
    local_vllm_model_proxy:
      entrypoint: app.py

      chat_template_kwargs:
        enable_thinking: false

      # This class accepts normal VLLMModel config parameters
      return_token_id_information: false
      uses_reasoning_parser: true

      model_server:
        type: responses_api_models
        name: policy_model
